name: CI/CD Pipeline

# note: small non-functional update to create PR (timestamp will show commit)
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # 代码质量检查
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # 停止构建如果有语法错误或未定义名称
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 退出代码为零以将其视为警告
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: black --check --diff .

    - name: Check import sorting with isort
      run: isort --check-only --diff .

    - name: Type check with mypy
      run: mypy server/ tools/ --ignore-missing-imports

  # Python 测试
  test-python:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ --cov=server --cov=tools --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # VS Code 扩展构建和测试
  test-extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: extensions/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint TypeScript
      run: npm run lint

    - name: Compile TypeScript
      run: npm run compile

    - name: Run tests
      run: npm test

    - name: Package extension
      run: npm run package

    - name: Upload extension artifact
      uses: actions/upload-artifact@v3
      with:
        name: vscode-extension-${{ github.sha }}
        path: extensions/*.vsix
        retention-days: 30

  # 集成测试
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-python]
    
    services:
      # 模拟 Ollama 服务（在实际环境中需要真正的 Ollama）
      mockserver:
        image: mockserver/mockserver:5.15.0
        ports:
          - 1080:1080

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install requests

    - name: Setup mock Ollama responses
      run: |
        # 设置模拟响应
        curl -X PUT "http://localhost:1080/mockserver/expectation" \
          -H "Content-Type: application/json" \
          -d '{
            "httpRequest": {
              "method": "GET",
              "path": "/api/tags"
            },
            "httpResponse": {
              "statusCode": 200,
              "headers": {
                "Content-Type": ["application/json"]
              },
              "body": {
                "models": [
                  {"name": "qwen:7b", "size": 4368805184},
                  {"name": "deepseek-coder:6.7b", "size": 3825205184}
                ]
              }
            }
          }'

    - name: Start MCP server
      run: |
        export OLLAMA_HOST=http://localhost:1080
        python server/api_server.py &
        sleep 10  # 等待服务器启动

    - name: Run integration tests
      run: |
        python -m pytest tests/test_integration.py -v
        
    - name: Test API endpoints
      run: |
        # 测试健康检查
        curl -f http://localhost:8000/health
        
        # 测试模型列表
        curl -f http://localhost:8000/models

  # 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r server/ tools/ -f json -o bandit-report.json || true

    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: bandit-report.json

  # 性能测试
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust

    - name: Run performance tests
      run: |
        # 启动服务器
        python server/api_server.py &
        sleep 10
        
        # 运行性能测试
        locust -f tests/performance/locustfile.py --headless --users 10 --spawn-rate 2 --run-time 60s --host http://localhost:8000

  # 构建 Docker 镜像
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-python]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: your-org/local-mcp-agent
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 发布
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-extension, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download extension artifact
      uses: actions/download-artifact@v3
      with:
        name: vscode-extension-${{ github.sha }}
        path: ./extensions/

    - name: Generate changelog
      id: changelog
      run: |
        # 生成变更日志
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "## Changes" >> $GITHUB_OUTPUT
        git log --oneline --since="24 hours ago" >> $GITHUB_OUTPUT || echo "No recent changes" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          ## 🚀 Local MCP Agent v${{ github.run_number }}
          
          ${{ steps.changelog.outputs.CHANGELOG }}
          
          ### 📦 下载
          - VS Code 扩展: local-mcp-agent.vsix
          - 源代码: Source code (zip/tar.gz)
          
          ### 🔧 安装
          ```bash
          git clone https://github.com/your-org/local-mcp-agent.git
          cd local-mcp-agent
          ./scripts/setup.sh
          ```
          
          ### 📖 文档
          - [用户指南](docs/USER_GUIDE.md)
          - [API 文档](docs/API.md)
          - [开发指南](docs/DEVELOPMENT.md)
        draft: false
        prerelease: false

    - name: Upload Extension to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./extensions/local-mcp-agent.vsix
        asset_name: local-mcp-agent.vsix
        asset_content_type: application/zip

  # 部署文档
  docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js for docs
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Build documentation
      run: |
        # 如果使用 VitePress 或其他文档工具
        # npm install && npm run docs:build
        
        # 简单的文档部署（复制 Markdown 文件）
        mkdir -p docs-site
        cp -r docs/* docs-site/
        cp README.md docs-site/
        cp CHANGELOG.md docs-site/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs-site
        cname: your-domain.com  # 可选：自定义域名
